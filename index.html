<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NorthSky Live Auction</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #0b1120; color: #eef2ff; font-family: system-ui; padding: 2rem; }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #111827cc; backdrop-filter: blur(8px); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #334155; }
    input, select, button { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 0.75rem; border: none; }
    input, select { background: #0f172a; color: white; border: 1px solid #334155; }
    button { background: #2dd4bf; color: #020617; font-weight: bold; cursor: pointer; }
    button:hover { background: #14b8a6; }
    .bid-row { display: flex; gap: 0.5rem; }
    .bid-row button { width: auto; }
    .bid-history { max-height: 200px; overflow-y: auto; font-size: 0.8rem; margin-top: 1rem; }
    .bid-item { border-bottom: 1px solid #334155; padding: 0.3rem 0; }
    .highlight { color: #2dd4bf; font-weight: bold; }
    .timer { color: #f59e0b; font-family: monospace; font-size: 1.2rem; }
    .flex { display: flex; justify-content: space-between; margin: 0.5rem 0; }
    .status { font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🏛️ NorthSky Live Auction</h1>
  <div class="grid">
    <div class="card">
      <h2>🏠 New Lead</h2>
      <input type="text" id="leadName" placeholder="Full name">
      <input type="text" id="leadContact" placeholder="Phone / Email">
      <input type="text" id="leadPostal" placeholder="Postal code">
      <select id="leadService">
        <option>Roof inspection</option>
        <option>Leak check</option>
        <option>Insurance claim</option>
      </select>
      <button id="createLeadBtn">✨ Start Auction (60s)</button>
      <div id="leadStatus" class="status"></div>
    </div>
    <div class="card">
      <h2>🔨 Contractor</h2>
      <input type="text" id="contractorId" placeholder="Your ID">
      <input type="text" id="cityName" placeholder="City" value="Calgary">
      <button id="joinBtn">🌍 Join Market</button>
      <div id="connectionStatus" class="status">⚪ Not connected</div>
      <div id="auctionInfo" class="flex" style="margin-top:1rem;">💡 No active auction</div>
      <div id="bidControls" style="display:none;">
        <div class="bid-row">
          <input type="number" id="bidAmount" placeholder="Your bid $" step="10">
          <button id="placeBidBtn">💰 Bid</button>
        </div>
        <div id="bidFeedback" class="status"></div>
      </div>
      <div class="bid-history" id="bidHistory"><div class="bid-item">⏳ No bids yet</div></div>
    </div>
  </div>
</div>
<script>
  let socket, contractorId, currentCity, activeLeadId, expiresAt, currentHighestBid = 0, timerInterval;
  const contractorInput = document.getElementById('contractorId');
  const cityInput = document.getElementById('cityName');
  const joinBtn = document.getElementById('joinBtn');
  const createLeadBtn = document.getElementById('createLeadBtn');
  const leadStatus = document.getElementById('leadStatus');
  const connectionStatus = document.getElementById('connectionStatus');
  const auctionInfo = document.getElementById('auctionInfo');
  const bidControls = document.getElementById('bidControls');
  const bidAmount = document.getElementById('bidAmount');
  const placeBidBtn = document.getElementById('placeBidBtn');
  const bidFeedback = document.getElementById('bidFeedback');
  const bidHistory = document.getElementById('bidHistory');

  function addBid(bidder, amount) {
    const div = document.createElement('div');
    div.className = 'bid-item';
    div.innerHTML = `💰 <strong>${escapeHtml(bidder)}</strong> – $${amount.toFixed(2)}`;
    bidHistory.prepend(div);
    if (bidHistory.children.length > 15) bidHistory.removeChild(bidHistory.lastChild);
  }
  function clearBids() { bidHistory.innerHTML = '<div class="bid-item">⏳ No bids yet</div>'; }
  function escapeHtml(s) { return s.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'; }); }
  function updateUI() {
    if (!activeLeadId) { auctionInfo.innerHTML = '💡 No active auction'; bidControls.style.display = 'none'; return; }
    const left = expiresAt ? Math.max(0, Math.floor((expiresAt - Date.now())/1000)) : 0;
    auctionInfo.innerHTML = `<div class="flex"><strong>Lead:</strong> ${activeLeadId.slice(0,8)}...</div><div class="flex"><strong>Highest bid:</strong> <span class="highlight">$${currentHighestBid.toFixed(2)}</span></div><div class="flex"><strong>Time left:</strong> <span class="timer">${left}s</span></div>`;
    bidControls.style.display = left>0 ? 'block' : 'none';
  }
  function startTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(updateUI, 500); }

  function initSocket() {
    socket = io();
    socket.on('connect', () => { connectionStatus.innerHTML = '🟢 Connected'; if(currentCity && contractorId) socket.emit('join_city', currentCity); });
    socket.on('disconnect', () => connectionStatus.innerHTML = '⚪ Disconnected');
    socket.on('auction_started', (data) => { activeLeadId = data.leadId; expiresAt = data.expiresAt; currentHighestBid = 0; clearBids(); updateUI(); startTimer(); bidFeedback.innerHTML = 'New auction!'; });
    socket.on('new_bid', (data) => { if(data.leadId === activeLeadId) { currentHighestBid = data.highestBid; updateUI(); addBid(data.contractorId, data.highestBid); } });
    socket.on('auction_closed', (data) => { if(data.leadId === activeLeadId) { activeLeadId = null; updateUI(); bidFeedback.innerHTML = `Auction closed. Winner: ${data.winnerId}`; } });
    socket.on('bid_error', (err) => { bidFeedback.innerHTML = `❌ ${err.message}`; setTimeout(()=>bidFeedback.innerHTML='',2000); });
  }

  joinBtn.onclick = () => { contractorId = contractorInput.value.trim(); currentCity = cityInput.value.trim(); if(!contractorId || !currentCity) return alert('Enter ID and city'); if(!socket || !socket.connected) initSocket(); else socket.emit('join_city', currentCity); localStorage.setItem('contractor', contractorId); localStorage.setItem('city', currentCity); };
  createLeadBtn.onclick = async () => {
    const name = document.getElementById('leadName').value.trim();
    const contact = document.getElementById('leadContact').value.trim();
    const postal = document.getElementById('leadPostal').value.trim();
    const service = document.getElementById('leadService').value;
    if(!contact) return leadStatus.innerText = '⚠️ Contact required';
    leadStatus.innerText = 'Creating...';
    try {
      const res = await fetch('/lead', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, contact, postalCode:postal, service, city:currentCity || 'unknown' }) });
      const data = await res.json();
      if(data.success) leadStatus.innerText = `✅ Lead created! Auction started.`;
      else throw new Error(data.error);
    } catch(e) { leadStatus.innerText = `❌ Error: ${e.message}`; }
  };
  placeBidBtn.onclick = () => {
    if(!socket || !activeLeadId) return bidFeedback.innerText = 'No active auction';
    const amount = parseFloat(bidAmount.value);
    if(isNaN(amount) || amount <= currentHighestBid) return bidFeedback.innerText = `Bid must be > $${currentHighestBid}`;
    socket.emit('bid', { leadId: activeLeadId, contractorId, amount });
    bidAmount.value = '';
  };
  if(localStorage.getItem('contractor')) contractorInput.value = localStorage.getItem('contractor');
  if(localStorage.getItem('city')) cityInput.value = localStorage.getItem('city');
</script>
</body>
</html>
